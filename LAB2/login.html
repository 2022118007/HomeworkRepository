<!DOCTYPE html>
<html>
    <head>
        <title> LAB 2 - login</title>
        <link rel="stylesheet" type="text/css" href = "main.css">
    </head>
    <body>
        <h1 class="middle" >Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <div class="middle menu">
            <a class="dummy">로그인</a>
            <span>|</span>
            <a href="signup.html">회원가입</a>
        </div>
        <div class="box center">


            <div class="line">
                <p>
                    <label class="lefttext">아이디 :</label>
                    <span class="input">
                        <input class="inputbox input" id="loginid" name="loginid" type="text" placeholder="아이디 입력" required autocomplete="on"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">비밀번호 :</label>
                    <span class="input">
                        <input class="inputbox input" id="loginpw" name="loginpw" type="password" placeholder="비밀번호 입력" required autocomplete="current-password"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <button class="btn green">Login</button> <button class="btn btnsec red">Cancel</button>
                </p>
            </div>

        </div>
    </body>
</html>
