<!DOCTYPE html>
<html>
    <head>
        <title> LAB 3 - Sign Up</title>
        <link rel="stylesheet" type="text/css" href = "main.css">
    </head>
    <body>
        <h1 class="middle" >Welcome to INTERNET-PROGRAMMING MOVIE SITE</h1>
        <div class="middle menu">
            <a href="login.html">로그인</a>
            <span>|</span>
            <a class="dummy">회원가입</a>
        </div>
        <div class="box center">
            <div class="line">
                <p>
                    <label class="lefttext">이름 :</label>
                    <span class="input">
                        <input class="inputbox input" id="name" name="name" type="text" autofocus required autocomplete="name"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">생일 :</label>
                    <span class="input">
                       <input class="inputbox input" id="birthdate" name="birthdate" type="date" required autocomplete="bday"></p> 
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">성별 :</label>
                    <span class="input radio">
                        <input class="inputradio" name="gender" type="radio" value="남성" required checked>남성
                        <input class="inputradio" name="gender" type="radio" value="남성" required >여성
                    </span>
                </p>
            </div>
            
            <div class="line">
                <p>
                    <label class="lefttext">학년 :</label>
                    <span class="input">
                       <input class="inputbox input" id="grade" name="grade" type="number" value="" min="1" max="4" step="1"></p> 
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">아이디 :</label>
                    <span class="input">
                        <input class="inputbox input" id="id" name="id" type="text" required autocomplete="on"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">비밀번호 :</label>
                    <span class="input">
                        <input class="inputbox input" id="pw" name="pw" type="password" required autocomplete="current-password"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">이메일 :</label>
                    <span class="input">
                        <input class="inputbox input" id="email" name="email" type="email" required autocomplete="email"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">보안 질문 :</label>
                    <span class="input">
                        <select class="inputbox input" id="question" name="question" required autocomplete="off">
                            <option value="" disabled selected>질문을 선택하세요</option>
                            <option value="questionA">키우는 반려동물의 이름은?</option>
                            <option value="questionB">가장 좋아하는 작가는?</option>
                            <option value="questionC">가장 좋아하는 색깔은?</option>
                        </select>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <label class="lefttext">답변 :</label>
                    <span class="input">
                        <input class="inputbox input" id="answer" name="answer" type="text" required autocomplete="off"/>
                    </span>
                </p>
            </div>

            <div class="line">
                <p>
                    <button class="btn green">Signup</button> 
                    <button class="btn btnsec red">Cancel</button>
                </p>
            </div>

        </div>
    </body>
</html>
